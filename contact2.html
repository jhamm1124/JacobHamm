<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Jacob Hamm - Computer & Information Science student from Messiah University. Focused on Business Information Systems; eager to build technical skills." />
        <title>Jacob Hamm - Contact</title>
        <!-- Favicon-->
        <link rel="icon" type="image/png" href="assets/PersonalFavicon.png" />
        <!-- Custom Google font-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <!-- Web3Forms Client Script -->
        <script src="https://web3forms.com/client/script.js" async defer></script>
        <style>
            .custom-shadow {
                box-shadow: 0 0.5rem 1rem rgba(255, 255, 255, 0.1) !important;
            }
            .sticky-nav {
                position: sticky;
                top: 0;
                z-index: 1000;
                background-color: #212529;
            }
            body {
                background-color: #212529;
                color: #f8f9fa;
            }
            .bg-light {
                background-color: #2c3034 !important;
            }
            .text-muted {
                color: #adb5bd !important;
            }
            .btn-outline-dark {
                color: #f8f9fa;
                border-color: #f8f9fa;
            }
            .btn-outline-dark:hover {
                background-color: #f8f9fa;
                color: #212529;
            }
            .form-control {
                background-color: #2c3034;
                border-color: #495057;
                color: #f8f9fa;
            }
            .form-control:focus {
                background-color: #2c3034;
                border-color: #0d6efd;
                color: #f8f9fa;
            }
            .form-floating label {
                color: #adb5bd;
            }
            .form-floating>.form-control:focus~label,
            .form-floating>.form-control:not(:placeholder-shown)~label {
                color: #0d6efd;
            }
            /* Theme Toggle Switch Styles */
            .switch {
                font-size: 17px;
                position: relative;
                display: inline-block;
                width: 3.5em;
                height: 2em;
                transform-style: preserve-3d;
                perspective: 500px;
                animation: toggle__animation 3s infinite;
            }

            .switch::before {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                left: 0;
                top: 0;
                filter: blur(20px);
                z-index: -1;
                border-radius: 50px;
                background-color: #d8ff99;
                background-image: radial-gradient(at 21% 46%, hsla(183,65%,60%,1) 0px, transparent 50%),
                radial-gradient(at 23% 25%, hsla(359,74%,70%,1) 0px, transparent 50%),
                radial-gradient(at 20% 1%, hsla(267,83%,75%,1) 0px, transparent 50%),
                radial-gradient(at 86% 87%, hsla(204,69%,68%,1) 0px, transparent 50%),
                radial-gradient(at 99% 41%, hsla(171,72%,77%,1) 0px, transparent 50%),
                radial-gradient(at 55% 24%, hsla(138,60%,62%,1) 0px, transparent 50%);
            }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #fdfefedc;
                transition: .4s;
                border-radius: 30px;
                border: 2px solid #adb5bd;
                box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 1.4em;
                width: 1.4em;
                left: 0.3em;
                bottom: 0.35em;
                transition: .4s;
                border-radius: 50%;
                box-shadow: rgba(0, 0, 0, 0.17) 0px -10px 10px 0px inset,
                    rgba(0, 0, 0, 0.09) 0px -1px 15px -8px;
                background-color: #ff99fd;
                background-image: radial-gradient(at 81% 39%, hsla(327,79%,79%,1) 0px, transparent 50%),
                radial-gradient(at 11% 72%, hsla(264,64%,79%,1) 0px, transparent 50%),
                radial-gradient(at 23% 20%, hsla(75,98%,71%,1) 0px, transparent 50%);
            }

            .input__check:checked + .slider {
                background-color: #17202A;
                border-color: #495057;
            }

            .input__check:checked + .slider:before {
                transform: translateX(1.5em);
            }

            @keyframes toggle__animation {
                0%, 100% {
                    transform: translateY(-10px) rotateX(15deg) rotateY(-20deg);
                }

                50% {
                    transform: translateY(0px) rotateX(15deg) rotateY(-20deg);
                }
            }
        </style>
    </head>
    <body class="d-flex flex-column h-100">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            <nav class="navbar navbar-expand navbar-dark bg-dark py-3 sticky-nav custom-shadow">
                <div class="container px-5">
                    <label class="switch me-3">
                        <input type="checkbox" class="input__check" id="themeToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <div class="navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                            <li class="nav-item"><a class="nav-link" href="index2.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="resume2.html">Resume</a></li>
                            <li class="nav-item"><a class="nav-link" href="contact2.html">Contact</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
            <!-- Page content-->
            <section class="py-5">
                <div class="container px-5">
                    <!-- Contact form-->
                    <div class="bg-dark rounded-4 py-5 px-4 px-md-5">
                        <div class="text-center mb-5">
                            <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
                            <h1 class="fw-bolder text-white">Get in touch</h1>
                            <p class="lead fw-normal text-muted mb-0">Let's work together!</p>
                        </div>
                        <div class="row gx-5 justify-content-center">
                            <div class="col-lg-8 col-xl-6">
                                <!-- * * * * * * * * * * * * * * *-->
                                <!-- * * SB Forms Contact Form * *-->
                                <!-- * * * * * * * * * * * * * * *-->
                                <!-- This form is pre-integrated with SB Forms.-->
                                <!-- To make this form functional, sign up at-->
                                <!-- https://startbootstrap.com/solution/contact-forms-->
                                <!-- to get an API token!-->

                                <!-- Contact form-->
                                <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                                    <!-- Required: Your Web3Forms key -->
                                    <input type="hidden" name="access_key" value="5a8b6235-46a0-4c09-8be9-39a3a2221da1">

                                    <!-- Optional but recommended -->
                                    <input type="hidden" name="subject" value="New Contact Form Submission - Your Website">

                                    <!-- Anti-spam honeypot (keep this) -->
                                    <input type="text" name="botcheck" style="display: none;">

                                    <!-- Name input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="name" name="name" type="text" placeholder="Enter your name..." required />
                                        <label for="name">Full name</label>
                                    </div>

                                    <!-- Email address input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required />
                                        <label for="email">Email address</label>
                                    </div>

                                    <!-- Phone number input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="phone" name="phone" type="tel" placeholder="(123) 456-7890" />
                                        <label for="phone">Phone number</label>
                                    </div>

                                    <!-- Message input-->
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="message" name="message" placeholder="Enter your message here..." style="height: 10rem" required></textarea>
                                        <label for="message">Message</label>
                                    </div>

                                    <!-- hCAPTCHA - Add this just before the submit button -->
                                    <div class="h-captcha" data-captcha="true" data-theme="dark" style="margin-bottom: 1rem;"></div>

                                    <!-- Submit Button-->
                                    <div class="d-grid">
                                        <button class="btn btn-primary btn-lg" type="submit">Submit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <!-- Footer-->
        <footer class="bg-dark py-4 mt-auto">
            <div class="container px-5">
                <div class="row align-items-center flex-column">
                    <div class="col-auto"><div class="small m-0 text-center text-white">Copyright &copy; jacobhamm.dev  <span id="currentYear"></span></div></div>
                </div>
            </div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <script>
            document.getElementById('themeToggle').addEventListener('change', function() {
                if (!this.checked) {
                    // Save current scroll position
                    localStorage.setItem('scrollPosition', window.scrollY);
                    window.location.href = 'contact.html';
                }
            });

            // Restore scroll position on page load
            window.addEventListener('load', function() {
                const scrollPosition = localStorage.getItem('scrollPosition');
                if (scrollPosition) {
                    window.scrollTo(0, parseInt(scrollPosition));
                    localStorage.removeItem('scrollPosition');
                }
            });

            // Handle form submission
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(this);
                
                fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showThankYouModal();
                        this.reset();
                    } else {
                        alert('Sorry, there was an error sending your message. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Sorry, there was an error sending your message. Please try again.');
                });
            });

            function showThankYouModal() {
                // Create modal overlay
                const modalOverlay = document.createElement('div');
                modalOverlay.className = 'modal-overlay';
                modalOverlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.5);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                    font-family: 'Plus Jakarta Sans', sans-serif;
                `;

                // Create modal content
                const modalContent = document.createElement('div');
                modalContent.className = 'modal-content';
                modalContent.style.cssText = `
                    background: #212529;
                    color: #f8f9fa;
                    padding: 2rem;
                    border-radius: 1rem;
                    text-align: center;
                    max-width: 400px;
                    width: 90%;
                    box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175);
                `;

                modalContent.innerHTML = `
                    <div class="success-icon" style="font-size: 4rem; color: #28a745; margin-bottom: 1rem;">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h2>Thank You!</h2>
                    <p class="text-muted">Your message has been sent successfully. I'll get back to you soon!</p>
                    <div class="countdown" style="font-size: 0.9rem; color: #adb5bd; margin-top: 1rem;">
                        This message will close in <span id="countdown">5</span> seconds...
                    </div>
                    <button class="btn btn-primary mt-3" onclick="closeModal()">Close</button>
                `;

                modalOverlay.appendChild(modalContent);
                document.body.appendChild(modalOverlay);

                // Countdown timer
                let countdown = 5;
                const countdownElement = modalContent.querySelector('#countdown');
                
                const timer = setInterval(() => {
                    countdown--;
                    countdownElement.textContent = countdown;
                    
                    if (countdown <= 0) {
                        clearInterval(timer);
                        closeModal();
                    }
                }, 1000);
                
                window.currentModal = modalOverlay;
                window.modalTimer = timer;
            }

            function closeModal() {
                if (window.currentModal) {
                    if (window.modalTimer) {
                        clearInterval(window.modalTimer);
                    }
                    window.currentModal.remove();
                    window.currentModal = null;
                    window.modalTimer = null;
                }
            }
        </script>
    </body>
</html>
