<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Thank You - Jacob Hamm</title>
        <link rel="icon" type="image/png" href="assets/PersonalFavicon.png" />
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                font-family: 'Plus Jakarta Sans', sans-serif;
            }
            .modal-content {
                background: white;
                padding: 2rem;
                border-radius: 1rem;
                text-align: center;
                max-width: 400px;
                width: 90%;
                box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175);
            }
            .success-icon {
                font-size: 4rem;
                color: #28a745;
                margin-bottom: 1rem;
            }
            .countdown {
                font-size: 0.9rem;
                color: #6c757d;
                margin-top: 1rem;
            }
        </style>
    </head>
    <body>
        <div class="modal-overlay">
            <div class="modal-content">
                <div class="success-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2>Thank You!</h2>
                <p class="text-muted">Your message has been sent successfully. I'll get back to you soon!</p>
                <div class="countdown">Redirecting back to contact page in <span id="countdown">5</span> seconds...</div>
                <button class="btn btn-primary mt-3" onclick="closeModal()">Return to Contact</button>
            </div>
        </div>

        <script>
            let countdown = 5;
            const countdownElement = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    closeModal();
                }
            }, 1000);
            
            function closeModal() {
                window.history.back();
            }
            
            // Close modal when clicking overlay
            document.querySelector('.modal-overlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        </script>
    </body>
</html>
